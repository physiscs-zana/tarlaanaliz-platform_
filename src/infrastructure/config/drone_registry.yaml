# BOUND: TARLAANALIZ_SSOT_v1_2_0.txt – canonical rules are referenced, not duplicated.
# KR-034 (v1.2.0): Aktif Operasyon Plani, KR-030 (Drone spesifikasyonlari)
# drone_registry.yaml: Onayli drone + sensor kombinasyonlari
#
# KR-034 v1.2.0 senaryolari (aktif operasyon plani):
#   Senaryo A (hizli pivot): Parrot Sequoia+ veya MicaSense RedEdge-P + RTK multirotor
#   Senaryo B (uzun vadeli): WingtraOne Gen II veya AgEagle eBee X (fixed-wing)
#
# Tum modeller KR-017, KR-070-073 kurallarina tabidir.
# Bu dosya degistiginde drone_model VO ve pilot kayit servisi de guncellenir.

version: "1.2.0"
ssot_ref: "KR-034, KR-018, KR-082"

drones:
  - model_id: "DJI_MAVIC_3M"
    manufacturer: "DJI"
    model_name: "Mavic 3 Multispectral"
    sensor: "Integrated Multispectral + RGB"
    radiometry_type: "relative"
    band_class: "BASIC_4BAND"               # v1.2.0
    bands:
      - green
      - red
      - red_edge
      - nir
    red_edge_wavelength_nm: 730.0           # v1.2.0: Sentinel-2 Band 6
    min_gsd_cm: 5.0
    max_coverage_donum_per_flight: 400
    task_file_format: "WPML"
    phase: 1
    notes: >
      Birincil drone modeli. Relative radyometri; Pix4Dfields kalibrasyonu zorunlu (KR-018).
      4-band: NDVI, NDRE, GNDVI. Red edge ~730nm.

  - model_id: "DJI_M350_RTK_SENTERA_6X"
    manufacturer: "DJI"
    model_name: "Matrice 350 RTK"
    sensor: "Sentera 6X"
    radiometry_type: "absolute"
    band_class: "EXTENDED_5BAND"            # v1.2.0
    bands:
      - blue
      - green
      - red
      - red_edge
      - nir
      - thermal
    red_edge_wavelength_nm: 717.0           # v1.2.0: Sentinel-2 Band 5
    thermal_sensor: "Sentera 6X Thermal"    # v1.2.0
    min_gsd_cm: 3.0
    max_coverage_donum_per_flight: 800
    task_file_format: "WPML"
    phase: 2
    notes: >
      5-band + termal. Mutlak radyometri. KR-034 aktif operasyon plani.
      EVI, SAVI, chlorophyll-a + CWSI, canopy temp (KR-084).

  - model_id: "WINGTRAONE_GEN2"
    manufacturer: "Wingtra"
    model_name: "WingtraOne Gen II"
    sensor: "MicaSense RedEdge-P"
    radiometry_type: "absolute"
    band_class: "EXTENDED_5BAND"            # v1.2.0
    bands:
      - blue
      - green
      - red
      - red_edge
      - nir
    red_edge_wavelength_nm: 715.0           # v1.2.0: Sentinel-2 Band 5
    min_gsd_cm: 2.0
    max_coverage_donum_per_flight: 1500
    task_file_format: "KML"
    phase: 2
    notes: >
      Fixed-wing; genis alan, ucus basina yuksek kapsama. Mutlak radyometri temeli.
      KR-034 Senaryo B kapsaminda DJI bagimsizlik planinin uzun vadeli cozumu.

  - model_id: "PARROT_SEQUOIA_PLUS"
    manufacturer: "Parrot"
    model_name: "ANAFI USA + Sequoia+"
    sensor: "Parrot Sequoia+"
    radiometry_type: "absolute"
    band_class: "BASIC_4BAND"               # v1.2.0
    bands:
      - green
      - red
      - red_edge
      - nir
    red_edge_wavelength_nm: 735.0           # v1.2.0
    min_gsd_cm: 4.0
    max_coverage_donum_per_flight: 600
    task_file_format: "KML"
    phase: 2
    notes: >
      KR-034 Senaryo A: DJI tedarik kesintisinde hizli gecis alternatifi.
      Rutin bakim surdurulebilir; tam radyometrik kalibrasyon destekli.

  - model_id: "AGEAGLE_EBEE_X"
    manufacturer: "AgEagle"
    model_name: "eBee X"
    sensor: "senseFly Altum-PT"
    radiometry_type: "absolute"
    band_class: "EXTENDED_5BAND"            # v1.2.0
    bands:
      - blue
      - green
      - red
      - red_edge
      - nir
      - thermal
    red_edge_wavelength_nm: 717.0           # v1.2.0: Sentinel-2 Band 5
    thermal_sensor: "MicaSense Altum-PT LWIR"  # v1.2.0
    min_gsd_cm: 2.5
    max_coverage_donum_per_flight: 2000
    task_file_format: "KML"
    phase: 2
    notes: >
      Fixed-wing; termal band dahil en guclu radyometrik temel.
      KR-034 Senaryo B'nin ikincil secenegi; buyuk tarim alanlari icin ideal.

# Gecerli radiometry tipleri
radiometry_types:
  relative:
    description: "Goreli kalibrasyon (Pix4Dfields ile islenir, KR-018)"
    calibration_tool: "Pix4Dfields"
    hard_gate: true
  absolute:
    description: "Mutlak reflektans (MicaSense/Sentera/Altum-PT donanim paneli)"
    calibration_tool: "Pix4Dfields"
    hard_gate: true

# SOP referanslari (BOLUM 2)
sop:
  task_file_naming: "TA-{mission_id}-{field_id}-{date}"
  min_coverage_ratio_full_pay: 0.95
  min_coverage_ratio_partial: 0.80
  m1_machine: "Pix4Dfields + kalibrasyon (air-gap, offline)"
  m2_machine: "mTLS outbound upload (Platform API'ye)"
